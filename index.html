<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Manager Pro | Boss Edition</title>
    <!-- PWA Metadata for App-like feel -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3182ce">
    <style>
        :root { --primary: #3182ce; --success: #38a169; --danger: #e53e3e; --admin: #7c3aed; --utility: #d97706; --notice: #fffbeb; }
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 1rem auto; padding: 1rem; background: #f8fafc; color: #1e293b; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .admin-card { border: 2px solid var(--admin); background: #f5f3ff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        
        .stats-board { display: flex; justify-content: space-around; background: var(--primary); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; text-align: center; font-weight: bold;}
        
        .ledger-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        @media (max-width: 600px) { .ledger-container { grid-template-columns: 1fr; } }
        .ledger-col { background: #f1f5f9; padding: 10px; border-radius: 8px; min-height: 100px; }
        .ledger-col h5 { margin: 0 0 10px 0; text-align: center; border-bottom: 1px solid #cbd5e0; padding-bottom: 5px; }

        input, button, select { width: 100%; margin-bottom: 10px; padding: 0.8rem; border-radius: 6px; border: 1px solid #cbd5e0; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-meal { background: var(--success); }
        .btn-utility { background: var(--utility); }
        .btn-admin { background: var(--admin); }
        .btn-danger { background: var(--danger); width: auto; padding: 4px 8px; font-size: 0.7rem; }
        
        .hidden { display: none !important; }
        .list-item { font-size: 0.8rem; padding: 5px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .timestamp-label { font-size: 0.65rem; color: #64748b; display: block; }
    </style>
</head>
<body>

    <div id="authSection" class="card">
        <h2>Hostel Entrance</h2>
        <input type="text" id="userName" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Sign In</button>
        <button id="signupBtn" class="btn-meal">New Member? Sign Up</button>
    </div>

    <div id="appSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>Welcome, <span id="displayName"></span>!</h3>
            <button id="logoutBtn" class="btn-danger" style="background:#64748b">Logout</button>
        </div>

        <!-- ADMIN PANEL: Updated Labels -->
        <div id="bossPanel" class="card admin-card hidden">
            <h4 style="color: var(--admin); margin: 0 0 10px 0;">🛡️ Member Meal Entry (Admin)</h4>
            <div class="grid">
                <input type="text" id="targetMember" placeholder="Type Username (e.g. rocky)">
                <input type="number" id="adminMealQty" step="0.25" value="1">
            </div>
            <div style="display:flex; gap:10px;">
                <button id="adminLunchBtn" class="btn-admin">Lunch</button>
                <button id="adminDinnerBtn" class="btn-admin">Dinner</button>
            </div>
        </div>

        <div class="stats-board">
            <div><span>Total Bazaar</span><br>৳<span id="totalBazaar">0</span></div>
            <div><span>Total Utility</span><br>৳<span id="totalUtility">0</span></div>
            <div><span>Meal Rate</span><br>৳<span id="mealRate">0.00</span></div>
        </div>

        <div class="grid">
            <div class="card">
                <h4>Add Expense</h4>
                <input type="text" id="expItem" placeholder="Item Name">
                <input type="number" id="expAmount" placeholder="Amount (৳)">
                <div style="display:flex; gap:10px;">
                    <button id="addBazaarBtn">Add Bazaar</button>
                    <button id="addUtilityBtn" class="btn-utility">Add Utility</button>
                </div>
            </div>
            <div class="card">
                <h4>Self Meal Entry</h4>
                <input type="number" id="mealQty" step="0.25" value="1">
                <div style="display:flex; gap:10px;">
                    <button id="lunchBtn" class="btn-meal">Lunch</button>
                    <button id="dinnerBtn" class="btn-meal">Dinner</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h4>Today's Activity Ledger</h4>
            <div class="ledger-container">
                <div class="ledger-col">
                    <h5 style="color: var(--success);">🍲 Meals</h5>
                    <div id="mealList"></div>
                </div>
                <div class="ledger-col">
                    <h5 style="color: var(--primary);">🛒 Bazaar</h5>
                    <div id="bazaarList"></div>
                </div>
                <div class="ledger-col">
                    <h5 style="color: var(--utility);">💡 Utility</h5>
                    <div id="utilityList"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h4>Monthly Summary</h4>
                <button id="refreshReport" style="width:auto; padding:5px 10px; font-size:0.8rem;">Refresh Table</button>
            </div>
            <table class="report-table" style="width:100%; border-collapse: collapse; font-size: 0.85rem; margin-top:10px;">
                <thead><tr style="background:#edf2f7;"><th style="border:1px solid #cbd5e0; padding:8px;">Name</th><th style="border:1px solid #cbd5e0; padding:8px;">Bazaar</th><th style="border:1px solid #cbd5e0; padding:8px;">Meals</th><th style="border:1px solid #cbd5e0; padding:8px;">Cost</th><th style="border:1px solid #cbd5e0; padding:8px;">Balance</th></tr></thead>
                <tbody id="reportTableBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXxU3Tskg_8zptLpn1qN2i6TrvBo5apUI",
            authDomain: "hostel-manager-pro-11593.firebaseapp.com",
            projectId: "hostel-manager-pro-11593",
            storageBucket: "hostel-manager-pro-11593.firebasestorage.app",
            messagingSenderId: "925992393200",
            appId: "1:925992393200:web:e1c445add4a9d400652535"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const ADMIN_UID = "1qVj4SXnRvXFgXrVi0rZmpJZjJv1";

        const getEmail = () => document.getElementById('userName').value.trim().toLowerCase() + "@hostel.me";
        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, getEmail(), document.getElementById('password').value).catch(e => alert("Login Failed"));
        document.getElementById('signupBtn').onclick = () => createUserWithEmailAndPassword(auth, getEmail(), document.getElementById('password').value).catch(e => alert(e.message));
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                document.getElementById('displayName').innerText = user.email.split('@')[0].toUpperCase();
                if (user.uid === ADMIN_UID) document.getElementById('bossPanel').classList.remove('hidden');
                runApp(user);
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
        });

        function runApp(user) {
            const q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                let bazaar = 0, utility = 0, totalMeals = 0, members = {};
                const mList = document.getElementById('mealList'), bList = document.getElementById('bazaarList'), uList = document.getElementById('utilityList');
                mList.innerHTML = ''; bList.innerHTML = ''; uList.innerHTML = '';
                const todayStr = new Date().toLocaleDateString();

                snapshot.forEach(d => {
                    const data = d.data();
                    if (!data.timestamp) return;
                    const logDate = data.timestamp.toDate().toLocaleDateString();
                    const logTime = data.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    if (!members[data.name]) members[data.name] = { paid: 0, ate: 0 };
                    const delBtn = (user.uid === ADMIN_UID || data.uid === user.uid) ? `<button class="btn-danger" onclick="deleteEntry('${d.id}')">X</button>` : '';

                    if (data.type === "meal") {
                        totalMeals += Number(data.meals);
                        members[data.name].ate += Number(data.meals);
                        if (logDate === todayStr) {
                            mList.innerHTML += `<div class="list-item"><span><b>${data.name}</b>: ${data.mealType} ${data.meals}<span class="timestamp-label">${logTime}</span></span> ${delBtn}</div>`;
                        }
                    } else if (data.type === "bazaar") {
                        bazaar += data.amount;
                        members[data.name].paid += data.amount;
                        if (logDate === todayStr) bList.innerHTML += `<div class="list-item"><span><b>${data.name}</b>: ${data.item} (৳${data.amount})<span class="timestamp-label">${logTime}</span></span> ${delBtn}</div>`;
                    } else if (data.type === "utility") {
                        utility += data.amount;
                        if (logDate === todayStr) uList.innerHTML += `<div class="list-item"><span><b>${data.name}</b>: ${data.item} (৳${data.amount})<span class="timestamp-label">${logTime}</span></span> ${delBtn}</div>`;
                    }
                });

                const mealRate = totalMeals > 0 ? bazaar / totalMeals : 0;
                document.getElementById('totalBazaar').innerText = bazaar;
                document.getElementById('totalUtility').innerText = utility;
                document.getElementById('mealRate').innerText = mealRate.toFixed(2);

                document.getElementById('refreshReport').onclick = () => {
                    const table = document.getElementById('reportTableBody');
                    table.innerHTML = '';
                    for (const name in members) {
                        const m = members[name];
                        const cost = m.ate * mealRate;
                        const bal = m.paid - cost;
                        table.innerHTML += `<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:8px; border:1px solid #cbd5e0;">${name}</td><td style="padding:8px; border:1px solid #cbd5e0;">${m.paid}</td><td style="padding:8px; border:1px solid #cbd5e0;">${m.ate.toFixed(2)}</td><td style="padding:8px; border:1px solid #cbd5e0;">${cost.toFixed(0)}</td><td style="padding:8px; border:1px solid #cbd5e0; color:${bal>=0?'green':'red'}">${bal.toFixed(0)}</td></tr>`;
                    }
                };
            });
        }

        window.deleteEntry = async (id) => await deleteDoc(doc(db, "transactions", id));
        const logExpense = async (type) => {
            const item = document.getElementById('expItem').value, amt = Number(document.getElementById('expAmount').value);
            if(item && amt > 0) { await addDoc(collection(db, "transactions"), { type, name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, item, amount: amt, timestamp: serverTimestamp() }); document.getElementById('expItem').value = ''; document.getElementById('expAmount').value = ''; }
        };
        document.getElementById('addBazaarBtn').onclick = () => logExpense('bazaar');
        document.getElementById('addUtilityBtn').onclick = () => logExpense('utility');

        const logMeal = async (type, uName = null, uId = null) => {
            const qty = Number(document.getElementById(uName ? 'adminMealQty' : 'mealQty').value);
            if(qty > 0) { await addDoc(collection(db, "transactions"), { type: "meal", mealType: type, name: uName || auth.currentUser.email.split('@')[0], uid: uId || auth.currentUser.uid, meals: qty, timestamp: serverTimestamp() }); }
        };
        document.getElementById('lunchBtn').onclick = () => logMeal('Lunch');
        document.getElementById('dinnerBtn').onclick = () => logMeal('Dinner');
        document.getElementById('adminLunchBtn').onclick = () => logMeal('Lunch', document.getElementById('targetMember').value.trim().toLowerCase(), "ADMIN_FORCED");
        document.getElementById('adminDinnerBtn').onclick = () => logMeal('Dinner', document.getElementById('targetMember').value.trim().toLowerCase(), "ADMIN_FORCED");
    </script>
</body>
</html>
