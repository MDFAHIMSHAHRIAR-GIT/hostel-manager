<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Manager | Boss Edition</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --admin: #7c3aed; --utility: #ea580c; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* PAGE 1: LOGIN BOX */
        #loginPage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 400px; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .login-card h2 { margin-bottom: 1.5rem; color: var(--primary); }

        /* PAGE 2: DASHBOARD */
        #dashboardPage { display: none; padding: 15px; max-width: 1000px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .nav { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* COMPONENTS */
        .card { background: white; padding: 1.2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 1.2rem; }
        .admin-section { border: 2.5px solid var(--admin); background: #f5f3ff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
        
        /* LEDGER COLUMNS */
        .ledger-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .col { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .col h5 { margin: 0 0 10px 0; text-align: center; padding-bottom: 5px; border-bottom: 2px solid #cbd5e0; }

        /* INPUTS & BUTTONS */
        input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e0; box-sizing: border-box; font-size: 14px; outline: none; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-meal { background: var(--success); }
        .btn-admin { background: var(--admin); }
        .btn-utility { background: var(--utility); }
        .btn-logout { background: #64748b; width: auto; padding: 8px 15px; }
        .btn-del { background: var(--danger); width: auto; padding: 2px 8px; font-size: 10px; }

        /* UI ELEMENTS */
        .item { font-size: 0.85rem; padding: 8px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .time { font-size: 0.7rem; color: #94a3b8; display: block; }
        .stats { display: flex; justify-content: space-around; background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .hidden { display: none !important; }

        @media (max-width: 700px) { .ledger-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-card">
            <h2>Hostel Entrance</h2>
            <input type="text" id="user" placeholder="Username (e.g. fahim)">
            <input type="password" id="pass" placeholder="Password">
            <button id="loginBtn">Sign In</button>
            <button id="signupBtn" class="btn-meal">New Member? Join Us</button>
        </div>
    </div>

    <div id="dashboardPage">
        <div class="nav">
            <div><b>Boss:</b> <span id="displayUser"></span></div>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>

        <div id="bossPanel" class="card admin-section hidden">
            <h4 style="margin:0 0 10px 0; color:var(--admin)">🛡️ Admin Master Control</h4>
            <div class="flex-row">
                <input type="text" id="target" placeholder="Whose meal? (username)">
                <input type="number" id="admQty" step="0.25" value="1" style="width:80px">
            </div>
            <div class="flex-row">
                <button id="admLunch" class="btn-admin">Lunch</button>
                <button id="admDinner" class="btn-admin">Dinner</button>
            </div>
        </div>

        <div class="stats">
            <div>Bazaar<br>৳<span id="statBazaar">0</span></div>
            <div>Utility<br>৳<span id="statUtil">0</span></div>
            <div>Rate<br>৳<span id="statRate">0.00</span></div>
        </div>

        <div class="grid">
            <div class="card">
                <h4>Log Daily Meal</h4>
                <input type="number" id="myQty" step="0.25" value="1">
                <div class="flex-row">
                    <button id="btnLunch" class="btn-meal">Lunch</button>
                    <button id="btnDinner" class="btn-meal">Dinner</button>
                </div>
            </div>
            <div class="card">
                <h4>Log Expense</h4>
                <input type="text" id="item" placeholder="What did you buy?">
                <input type="number" id="amt" placeholder="Amount (৳)">
                <div class="flex-row">
                    <button id="btnBazaar">Bazaar</button>
                    <button id="btnUtil" class="btn-utility">Utility</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h4>Today's Activity</h4>
            <div class="ledger-grid">
                <div class="col">
                    <h5 style="color:var(--success)">Meals</h5>
                    <div id="listMeals"></div>
                </div>
                <div class="col">
                    <h5 style="color:var(--primary)">Bazaar</h5>
                    <div id="listBazaar"></div>
                </div>
                <div class="col">
                    <h5 style="color:var(--utility)">Utility</h5>
                    <div id="listUtil"></div>
                </div>
            </div>
        </div>

        <div class="card" style="overflow-x:auto">
            <h4>Monthly Ledger</h4>
            <table style="width:100%; border-collapse: collapse; font-size: 13px;">
                <thead style="background:#f8fafc">
                    <tr><th style="padding:8px; border:1px solid #ddd">Name</th><th style="padding:8px; border:1px solid #ddd">Paid</th><th style="padding:8px; border:1px solid #ddd">Meals</th><th style="padding:8px; border:1px solid #ddd">Cost</th><th style="padding:8px; border:1px solid #ddd">Balance</th></tr>
                </thead>
                <tbody id="summaryTable"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXxU3Tskg_8zptLpn1qN2i6TrvBo5apUI",
            authDomain: "hostel-manager-pro-11593.firebaseapp.com",
            projectId: "hostel-manager-pro-11593",
            storageBucket: "hostel-manager-pro-11593.firebasestorage.app",
            messagingSenderId: "925992393200",
            appId: "1:925992393200:web:e1c445add4a9d400652535"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const BOSS_ID = "1qVj4SXnRvXFgXrVi0rZmpJZjJv1";

        const getEmail = () => document.getElementById('user').value.trim().toLowerCase() + "@mess.com";

        // AUTH HANDLERS
        document.getElementById('loginBtn').onclick = () => {
            const p = document.getElementById('pass').value;
            if(!p) return alert("Enter password, Boss!");
            signInWithEmailAndPassword(auth, getEmail(), p).catch(e => alert("Wrong Credentials"));
        };

        document.getElementById('signupBtn').onclick = () => {
            const p = document.getElementById('pass').value;
            if(p.length < 6) return alert("Password must be 6+ chars");
            createUserWithEmailAndPassword(auth, getEmail(), p).catch(e => alert(e.message));
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // ROUTING LOGIC (Single page switching)
        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'block';
                document.getElementById('displayUser').innerText = user.email.split('@')[0].toUpperCase();
                if(user.uid === BOSS_ID) document.getElementById('bossPanel').classList.remove('hidden');
                initData(user);
            } else {
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('dashboardPage').style.display = 'none';
            }
        });

        function initData(currentUser) {
            const q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                let bazaarTotal = 0, utilTotal = 0, mealCount = 0, members = {};
                const mList = document.getElementById('listMeals'), bList = document.getElementById('listBazaar'), uList = document.getElementById('listUtil');
                mList.innerHTML = ''; bList.innerHTML = ''; uList.innerHTML = '';
                const today = new Date().toLocaleDateString();

                snap.forEach(s => {
                    const d = s.data(); if(!d.timestamp) return;
                    const logDate = d.timestamp.toDate().toLocaleDateString();
                    const logTime = d.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    if(!members[d.name]) members[d.name] = { paid:0, ate:0 };

                    const del = (currentUser.uid === BOSS_ID || d.uid === currentUser.uid) ? `<button class="btn-del" onclick="removeEntry('${s.id}')">X</button>` : '';

                    if(d.type === "meal") {
                        mealCount += Number(d.qty);
                        members[d.name].ate += Number(d.qty);
                        if(logDate === today) mList.innerHTML += `<div class="item"><span><b>${d.name}</b>: ${d.mealType} ${d.qty}<span class="time">${logTime}</span></span>${del}</div>`;
                    } else if(d.type === "bazaar") {
                        bazaarTotal += d.amt; members[d.name].paid += d.amt;
                        if(logDate === today) bList.innerHTML += `<div class="item"><span><b>${d.name}</b>: ${d.info} (৳${d.amt})<span class="time">${logTime}</span></span>${del}</div>`;
                    } else if(d.type === "util") {
                        utilTotal += d.amt;
                        if(logDate === today) uList.innerHTML += `<div class="item"><span><b>${d.name}</b>: ${d.info} (৳${d.amt})<span class="time">${logTime}</span></span>${del}</div>`;
                    }
                });

                const rate = mealCount > 0 ? bazaarTotal / mealCount : 0;
                document.getElementById('statBazaar').innerText = bazaarTotal;
                document.getElementById('statUtil').innerText = utilTotal;
                document.getElementById('statRate').innerText = rate.toFixed(2);

                const table = document.getElementById('summaryTable'); table.innerHTML = '';
                for(const name in members) {
                    const m = members[name], cost = m.ate * rate, bal = m.paid - cost;
                    table.innerHTML += `<tr><td style="padding:8px; border:1px solid #ddd">${name}</td><td style="padding:8px; border:1px solid #ddd">${m.paid}</td><td style="padding:8px; border:1px solid #ddd">${m.ate.toFixed(1)}</td><td style="padding:8px; border:1px solid #ddd">${cost.toFixed(0)}</td><td style="padding:8px; border:1px solid #ddd; font-weight:bold; color:${bal>=0?'green':'red'}">${bal.toFixed(0)}</td></tr>`;
                }
            });
        }

        window.removeEntry = async (id) => await deleteDoc(doc(db, "transactions", id));

        const post = async (data) => await addDoc(collection(db, "transactions"), { ...data, timestamp: serverTimestamp() });

        // BUTTON ACTIONS
        document.getElementById('btnLunch').onclick = () => post({ type:"meal", mealType:"Lunch", name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, qty: Number(document.getElementById('myQty').value) });
        document.getElementById('btnDinner').onclick = () => post({ type:"meal", mealType:"Dinner", name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, qty: Number(document.getElementById('myQty').value) });
        
        document.getElementById('admLunch').onclick = () => post({ type:"meal", mealType:"Lunch", name: document.getElementById('target').value.toLowerCase(), uid: "ADMIN_LOGGED", qty: Number(document.getElementById('admQty').value) });
        document.getElementById('admDinner').onclick = () => post({ type:"meal", mealType:"Dinner", name: document.getElementById('target').value.toLowerCase(), uid: "ADMIN_LOGGED", qty: Number(document.getElementById('admQty').value) });

        document.getElementById('btnBazaar').onclick = () => {
            const info = document.getElementById('item').value, amt = Number(document.getElementById('amt').value);
            if(info && amt > 0) post({ type:"bazaar", info, amt, name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid });
        };
        document.getElementById('btnUtil').onclick = () => {
            const info = document.getElementById('item').value, amt = Number(document.getElementById('amt').value);
            if(info && amt > 0) post({ type:"util", info, amt, name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid });
        };
    </script>
</body>
</html>
