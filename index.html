<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Manager Pro | Boss Edition</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --admin: #7c3aed; --utility: #ea580c; --notice: #fef3c7; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #f1f5f9; color: #1e293b; min-height: 100vh; }
        
        #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        #dashboardPage { display: none; padding: 15px; max-width: 1000px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        .card { background: white; padding: 1.2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 1.2rem; position: relative; }
        .admin-section { border: 2.5px solid var(--admin); background: #f5f3ff; }
        .notice-board { background: var(--notice); border-left: 5px solid #d97706; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
        
        .ledger-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .col { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .badge { background: var(--primary); color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; }

        input, button, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e0; box-sizing: border-box; font-size: 14px; outline: none; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-meal { background: var(--success); }
        .btn-admin { background: var(--admin); }
        .btn-utility { background: var(--utility); }
        .btn-logout { background: #64748b; width: auto; padding: 8px 15px; }
        .btn-del { background: var(--danger); width: auto; padding: 2px 8px; font-size: 10px; margin-left: 5px; }
        .btn-print { background: #334155; width: auto; padding: 5px 12px; font-size: 0.75rem; float: right; margin-top: -35px; }

        .history-item { font-size: 0.85rem; padding: 8px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .date-header { background: #334155; color: white; padding: 5px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin: 15px 0 5px 0; display: block; width: fit-content;}
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 0.8rem;}
        .hidden { display: none !important; }
        .member-chip { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin: 4px; border: 1px solid #bae6fd; }
        
        .history-box { max-height: 350px; overflow-y: auto; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0; margin-top: 10px; }

        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .btn-del, .btn-print { display: none !important; }
            .date-header { background: #000 !important; color: #fff !important; -webkit-print-color-adjust: exact; }
        }

        @media (max-width: 700px) { .ledger-grid { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="card" style="max-width: 400px; width: 100%; text-align: center;">
            <h2 style="color: var(--primary);">Hostel Entrance</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button id="loginBtn">Sign In</button>
            <button id="signupBtn" class="btn-meal">New Member? Sign Up</button>
        </div>
    </div>

    <div id="dashboardPage">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
            <div><b>Boss:</b> <span id="displayUser"></span></div>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>

        <div class="notice-board">
            <h4 style="margin: 0 0 5px 0;">📢 Notice Board</h4>
            <div id="noticeContent" style="font-size: 0.9rem; white-space: pre-wrap;">Fetching...</div>
            <div id="adminNoticeInput" class="hidden" style="margin-top: 10px;">
                <textarea id="newNotice" rows="2"></textarea>
                <button id="postNotice" class="btn-admin" style="width: auto; padding: 5px 15px;">Post Update</button>
            </div>
        </div>

        <div id="bossPanel" class="card admin-section hidden">
            <h4 style="margin:0 0 10px 0; color:var(--admin)">🛡️ Admin Master Control</h4>
            <div class="flex-row"><input type="text" id="target" placeholder="Username"><input type="number" id="admQty" step="0.25" value="1" style="width:80px"></div>
            <div class="flex-row"><button id="admLunch" class="btn-admin">Log Lunch</button><button id="admDinner" class="btn-admin">Log Dinner</button></div>
        </div>

        <div class="stats">
            <div>Bazaar<br>৳<span id="statBazaar">0</span></div>
            <div>Utility<br>৳<span id="statUtil">0</span></div>
            <div>Rate<br>৳<span id="statRate">0.00</span></div>
            <div>Members<br><span id="statMembers">0</span></div>
        </div>

        <div class="grid">
            <div class="card">
                <h4>Log Daily Meal</h4>
                <input type="number" id="myQty" step="0.25" value="1">
                <div class="flex-row"><button id="btnLunch" class="btn-meal">Lunch</button><button id="btnDinner" class="btn-meal">Dinner</button></div>
            </div>
            <div class="card">
                <h4>Log Expense</h4>
                <input type="text" id="item" placeholder="Name"><input type="number" id="amt" placeholder="৳">
                <div class="flex-row"><button id="btnBazaar">Bazaar</button><button id="btnUtil" class="btn-utility">Utility</button></div>
            </div>
        </div>

        <div class="grid">
            <div class="card" id="mealHistoryArea">
                <h4>🍲 Meal History</h4>
                <button class="btn-print" onclick="printDiv('mealHistoryArea')">Print Meals</button>
                <div id="mealHistory" class="history-box print-area"></div>
            </div>
            <div class="card" id="bazaarHistoryArea">
                <h4>🛒 Bazaar & Utility History</h4>
                <button class="btn-print" onclick="printDiv('bazaarHistoryArea')">Print Expenses</button>
                <div id="bazaarHistory" class="history-box print-area"></div>
            </div>
        </div>

        <div class="card" style="overflow-x:auto">
            <h4>Monthly Calculation Summary</h4>
            <table style="width:100%; border-collapse: collapse; font-size: 13px;">
                <thead style="background:#f8fafc"><tr><th>Name</th><th>Paid</th><th>Meals</th><th>Cost</th><th>Balance</th></tr></thead>
                <tbody id="summaryTable"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXxU3Tskg_8zptLpn1qN2i6TrvBo5apUI",
            authDomain: "hostel-manager-pro-11593.firebaseapp.com",
            projectId: "hostel-manager-pro-11593",
            storageBucket: "hostel-manager-pro-11593.firebasestorage.app",
            messagingSenderId: "925992393200",
            appId: "1:925992393200:web:e1c445add4a9d400652535"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const BOSS_ID = "1qVj4SXnRvXFgXrVi0rZmpJZjJv1";

        window.printDiv = (divId) => { window.print(); };

        const getEmail = () => document.getElementById('user').value.trim().toLowerCase() + "@mess.com";
        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, getEmail(), document.getElementById('pass').value).catch(e => alert("Login Error"));
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'block';
                document.getElementById('displayUser').innerText = user.email.split('@')[0].toUpperCase();
                if(user.uid === BOSS_ID) {
                    document.getElementById('bossPanel').classList.remove('hidden');
                    document.getElementById('adminNoticeInput').classList.remove('hidden');
                }
                initApp(user);
            } else {
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('dashboardPage').style.display = 'none';
            }
        });

        document.getElementById('postNotice').onclick = async () => {
            const text = document.getElementById('newNotice').value;
            if(text) await setDoc(doc(db, "settings", "notice"), { text });
        };
        onSnapshot(doc(db, "settings", "notice"), (s) => { if(s.exists()) document.getElementById('noticeContent').innerText = s.data().text; });

        function initApp(currentUser) {
            onSnapshot(collection(db, "users"), (snap) => { document.getElementById('statMembers').innerText = snap.size; });
            const q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                let bazaarTotal = 0, utilTotal = 0, mealTotal = 0, members = {};
                const mealBox = document.getElementById('mealHistory'), bazaarBox = document.getElementById('bazaarHistory');
                mealBox.innerHTML = ''; bazaarBox.innerHTML = '';
                let lastMealDate = "", lastBazaarDate = "";

                snap.forEach(s => {
                    const d = s.data(); if(!d.timestamp) return;
                    const logDate = d.timestamp.toDate().toLocaleDateString();
                    const logTime = d.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const val = Number(d.qty || d.meals || 0);
                    if(!members[d.name]) members[d.name] = { paid:0, ate:0 };
                    const del = (currentUser.uid === BOSS_ID || d.uid === currentUser.uid) ? `<button class="btn-del" onclick="delItem('${s.id}')">X</button>` : '';

                    if(d.type === "meal") {
                        mealTotal += val; members[d.name].ate += val;
                        if(logDate !== lastMealDate) { mealBox.innerHTML += `<div class="date-header">${logDate}</div>`; lastMealDate = logDate; }
                        mealBox.innerHTML += `<div class="history-item"><span>${d.name}: ${d.mealType} ${val} <small>(${logTime})</small></span>${del}</div>`;
                    } else {
                        if(d.type === "bazaar") { bazaarTotal += d.amt; members[d.name].paid += d.amt; } else { utilTotal += d.amt; }
                        if(logDate !== lastBazaarDate) { bazaarBox.innerHTML += `<div class="date-header">${logDate}</div>`; lastBazaarDate = logDate; }
                        bazaarBox.innerHTML += `<div class="history-item"><span>${d.name}: ${d.info} (৳${d.amt}) <small>(${logTime})</small></span>${del}</div>`;
                    }
                });

                const rate = mealTotal > 0 ? bazaarTotal / mealTotal : 0;
                document.getElementById('statBazaar').innerText = bazaarTotal;
                document.getElementById('statUtil').innerText = utilTotal;
                document.getElementById('statRate').innerText = rate.toFixed(2);

                const table = document.getElementById('summaryTable'); table.innerHTML = '';
                for(const name in members) {
                    const m = members[name], cost = m.ate * rate, bal = m.paid - cost;
                    table.innerHTML += `<tr><td style="padding:8px; border:1px solid #ddd">${name}</td><td style="padding:8px; border:1px solid #ddd">${m.paid}</td><td style="padding:8px; border:1px solid #ddd">${m.ate.toFixed(1)}</td><td style="padding:8px; border:1px solid #ddd">${cost.toFixed(0)}</td><td style="padding:8px; border:1px solid #ddd; font-weight:bold; color:${bal>=0?'green':'red'}">${bal.toFixed(0)}</td></tr>`;
                }
            });
        }

        window.delItem = async (id) => { if(confirm("Delete this?")) await deleteDoc(doc(db, "transactions", id)); };
        const post = async (data) => await addDoc(collection(db, "transactions"), { ...data, timestamp: serverTimestamp() });

        document.getElementById('btnLunch').onclick = () => post({ type:"meal", mealType:"Lunch", name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, qty: Number(document.getElementById('myQty').value) });
        document.getElementById('btnDinner').onclick = () => post({ type:"meal", mealType:"Dinner", name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, qty: Number(document.getElementById('myQty').value) });
        document.getElementById('admLunch').onclick = () => post({ type:"meal", mealType:"Lunch", name: document.getElementById('target').value.toLowerCase(), uid: "ADMIN", qty: Number(document.getElementById('admQty').value) });
        document.getElementById('admDinner').onclick = () => post({ type:"meal", mealType:"Dinner", name: document.getElementById('target').value.toLowerCase(), uid: "ADMIN", qty: Number(document.getElementById('admQty').value) });
        document.getElementById('btnBazaar').onclick = () => {
            const info = document.getElementById('item').value, amt = Number(document.getElementById('amt').value);
            if(info && amt > 0) post({ type:"bazaar", info, amt, name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid });
        };
        document.getElementById('btnUtil').onclick = () => {
            const info = document.getElementById('item').value, amt = Number(document.getElementById('amt').value);
            if(info && amt > 0) post({ type:"util", info, amt, name: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid });
        };
    </script>
</body>
</html>
